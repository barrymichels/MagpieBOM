<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}MagpieBOM{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #222; background: #fafafa; }
  nav { background: #1565c0; color: #fff; padding: 12px 24px; }
  nav a { color: #fff; text-decoration: none; font-size: 1.25em; font-weight: 600; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  a { color: #1565c0; }
  table { border-collapse: collapse; width: 100%; background: #fff; }
  th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; vertical-align: middle; }
  th { background: #f5f5f5; font-weight: 600; }
  tr:hover { background: #fafafa; }
  .found { color: #2e7d32; font-weight: 600; }
  .not-found { color: #c62828; font-weight: 600; }
  .pending { color: #e65100; font-weight: 600; }
  .img-cell img { height: 150px; width: auto; display: block; }
  .no-image { color: #999; }
  .btn { display: inline-block; padding: 6px 14px; background: #1565c0; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; text-decoration: none; }
  .btn:hover { background: #0d47a1; }
  .btn-sm { padding: 4px 10px; font-size: 0.8em; }
  .summary { color: #555; margin-bottom: 16px; }
  .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1565c0; transition: width 0.3s; }
</style>
</head>
<body>
<nav><a href="/">MagpieBOM</a></nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
